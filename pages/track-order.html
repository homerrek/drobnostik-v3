<main style="padding:40px 20px;">
  <div style="max-width:700px;margin:0 auto;">
    <h1 style="font-size:32px;font-weight:700;margin-bottom:8px;">📦 Sledovat objednávku</h1>
    <p style="color:#777;margin-bottom:28px;font-size:15px;">Zadejte číslo objednávky ve tvaru ORD-xxxxxxxxxx.</p>

    <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:24px;margin-bottom:24px;">
      <label for="track-order-number">Číslo objednávky</label>
      <div style="display:flex;gap:10px;margin-top:6px;">
        <input id="track-order-number" type="text" placeholder="ORD-1234567890"
          style="flex:1;padding:12px 14px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;font-size:15px;"
          onkeypress="if(event.key==='Enter') trackOrder()">
        <button onclick="trackOrder()" class="btn-primary" style="padding:12px 20px;">Sledovat</button>
      </div>
    </div>

    <div id="track-result"></div>
  </div>
</main>

<script>
async function trackOrder() {
  var num = document.getElementById('track-order-number')?.value?.trim().toUpperCase();
  if (!num) { showToast('Zadejte číslo objednávky'); return; }

  var res = document.getElementById('track-result');
  res.innerHTML = '<div class="loading-spinner"></div>';

  try {
    var sb = await getSupabase();
    var { data: order, error } = await sb.from('orders').select('*').eq('order_number', num).single();
    if (error || !order) {
      res.innerHTML = `<div style="text-align:center;padding:32px;color:#f44;">❌ Objednávka <strong>${escapeHtml(num)}</strong> nebyla nalezena.</div>`;
      return;
    }

    var statuses = [
      { key: 'pending', label: 'Přijato', icon: '📋' },
      { key: 'processing', label: 'Zpracovává se', icon: '🔄' },
      { key: 'printing', label: 'Výroba / tisk', icon: '🖨️' },
      { key: 'shipped', label: 'Odesláno', icon: '📦' },
      { key: 'delivered', label: 'Doručeno', icon: '✅' },
    ];
    var currentIdx = statuses.findIndex(s => s.key === order.status);

    var statusColors = { pending:'#999', processing:'#4af', printing:'#fa0', shipped:'#fb0', delivered:'#4f4' };
    var currentColor = statusColors[order.status] || '#c8a96a';

    res.innerHTML = `
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:24px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:13px;color:#666;margin-bottom:4px;">Číslo objednávky</div>
            <div style="font-family:monospace;font-size:17px;font-weight:700;color:#c8a96a;">${escapeHtml(order.order_number)}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:13px;color:#666;margin-bottom:4px;">Celkem</div>
            <div style="font-size:17px;font-weight:700;">${formatPrice(order.total_amount)} Kč</div>
          </div>
        </div>

        <div style="margin-bottom:24px;">
          <div style="font-size:13px;color:#666;margin-bottom:12px;">Stav objednávky</div>
          <div style="display:flex;gap:0;position:relative;">
            ${statuses.map((s, i) => `
              <div style="flex:1;text-align:center;position:relative;">
                <div style="width:32px;height:32px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:14px;
                  background:${i <= currentIdx ? currentColor : '#2a2a2a'};
                  border:2px solid ${i <= currentIdx ? currentColor : '#333'};
                  ${i < currentIdx ? 'opacity:0.7;' : ''}
                  transition:all 0.3s;">${i <= currentIdx ? s.icon : '○'}</div>
                <div style="font-size:11px;color:${i === currentIdx ? currentColor : '#555'};font-weight:${i === currentIdx ? '700' : '400'};">${s.label}</div>
                ${i < statuses.length - 1 ? `<div style="position:absolute;top:15px;left:50%;width:100%;height:2px;background:${i < currentIdx ? currentColor : '#2a2a2a'};z-index:-1;"></div>` : ''}
              </div>`).join('')}
          </div>
        </div>

        <!-- Shipping info -->
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid #2a2a2a;display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:14px;">
          <div style="background:#111;border-radius:8px;padding:14px;">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Zákazník</div>
            <div style="color:#ccc;font-weight:600;">${escapeHtml(order.customer_name)}</div>
            <div style="color:#777;font-size:13px;">${escapeHtml(order.customer_email || '')}</div>
            ${order.customer_phone ? `<div style="color:#777;font-size:13px;">${escapeHtml(order.customer_phone)}</div>` : ''}
          </div>
          <div style="background:#111;border-radius:8px;padding:14px;">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Doručovací adresa</div>
            <div style="color:#ccc;">${escapeHtml(order.customer_street || '')}</div>
            <div style="color:#ccc;">${escapeHtml(order.customer_city || '')} ${escapeHtml(order.customer_postal || '')}</div>
          </div>
          <div style="background:#111;border-radius:8px;padding:14px;">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Doprava</div>
            <div style="color:#ccc;font-weight:600;">${{
              zasilkovna:'📦 Zásilkovna — výdejní místo',
              zasilkovna_home:'📦 Zásilkovna domů',
              ppl:'🚚 PPL',
              dpd:'🚚 DPD',
              gls:'🚚 GLS',
              ceska_posta:'📮 Česká pošta — Do ruky',
              ceska_posta_box:'📮 Česká pošta — Na poštu',
              dhl_express:'⚡ DHL Express',
              pickup:'🏠 Osobní odběr Night City'
            }[order.shipping_method] || escapeHtml(order.shipping_method || '')}</div>
            <div style="color:#777;font-size:13px;">Objednáno: ${formatDate(order.created_at)}</div>
          </div>
          <div style="background:#111;border-radius:8px;padding:14px;">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Číslo zásilky</div>
            ${order.tracking_number
              ? `<div style="font-family:monospace;color:#c8a96a;font-weight:600;font-size:14px;">${escapeHtml(order.tracking_number)}</div>
                 <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
                   <a href="https://www.zasilkovna.cz/sledovani-zasilky?id=${escapeHtml(order.tracking_number)}" target="_blank" rel="noopener" style="font-size:12px;color:#c8a96a;text-decoration:none;background:rgba(200,169,106,0.1);padding:4px 10px;border-radius:4px;">📦 Zásilkovna →</a>
                   <a href="https://www.ppl.cz/main2.aspx?cls=Package&idSearch=${escapeHtml(order.tracking_number)}" target="_blank" rel="noopener" style="font-size:12px;color:#c8a96a;text-decoration:none;background:rgba(200,169,106,0.1);padding:4px 10px;border-radius:4px;">🚚 PPL →</a>
                   <a href="https://gls-group.eu/track?match=${escapeHtml(order.tracking_number)}" target="_blank" rel="noopener" style="font-size:12px;color:#c8a96a;text-decoration:none;background:rgba(200,169,106,0.1);padding:4px 10px;border-radius:4px;">🚚 GLS →</a>
                 </div>`
              : '<div style="color:#555;font-size:13px;">Zásilka ještě nebyla odeslána.</div>'}
          </div>
        </div>

        ${order.note ? `<div style="margin-top:14px;padding:12px 14px;background:#111;border-radius:8px;border-left:3px solid #c8a96a;font-size:13px;color:#999;"><strong style="color:#c8a96a;">Poznámka:</strong> ${escapeHtml(order.note)}</div>` : ''}
      </div>`;
  } catch (e) {
    res.innerHTML = `<div style="color:#f44;text-align:center;padding:32px;">Chyba: ${e.message}</div>`;
  }
}
window.trackOrder = trackOrder;
</script>
