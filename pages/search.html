<main style="padding:40px 20px;">
  <div style="max-width:1100px;margin:0 auto;">
    <h1 style="font-size:32px;font-weight:700;margin-bottom:24px;">🔍 Hledat produkty</h1>

    <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;margin-bottom:28px;">
      <div style="position:relative;">
      <input id="search-query" type="text" placeholder="Zadejte název produktu, barvu, kategorii..." autocomplete="off"
        style="width:100%;padding:14px 48px 14px 16px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;font-size:16px;" aria-label="Vyhledávání">
      <button onclick="startVoiceSearch('search-query')" title="Hlasové vyhledávání" aria-label="Hlasové vyhledávání" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#777;font-size:18px;cursor:pointer;padding:4px;" onmouseover="this.style.color='#c8a96a'" onmouseout="this.style.color='#777'">🎤</button>
      <div id="search-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid #333;border-radius:0 0 8px 8px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;" id="search-history-chips"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
        <div>
          <label>Kategorie</label>
          <select id="search-category" style="width:100%;padding:10px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;">
            <option value="">Všechny</option>
            <option value="Pokebally">Pokebally</option>
            <option value="Miniatures">Miniatures</option>
            <option value="Ostatní">Ostatní</option>
          </select>
        </div>
        <div>
          <label>Cena od (Kč)</label>
          <input id="search-price-min" type="number" placeholder="0" style="width:100%;padding:10px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;">
        </div>
        <div>
          <label>Cena do (Kč)</label>
          <input id="search-price-max" type="number" placeholder="9999" style="width:100%;padding:10px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;">
        </div>
        <div>
          <label>Řadit podle</label>
          <select id="search-sort" style="width:100%;padding:10px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;">
            <option value="relevance">Relevance</option>
            <option value="price_asc">Cena: vzestupně</option>
            <option value="price_desc">Cena: sestupně</option>
            <option value="name">Název A-Z</option>
          </select>
        </div>
      </div>
    </div>

    <div style="color:#777;font-size:14px;margin-bottom:16px;">Nalezeno: <strong id="search-count" style="color:#c8a96a;">—</strong> produktů</div>

    <div id="search-results" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:#666;">Zadejte hledaný výraz nebo vyberte filtr.</div>
    </div>
  </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Init autocomplete after products loaded
  setTimeout(() => initSearchAutocomplete('search-query', 'search-autocomplete'), 500);
});
</script>
