<main>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <div style="padding:16px 20px;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:1px;">Admin panel</div>
      <a href="/admin" onclick="event.preventDefault();goTo('/admin')">📊 Dashboard</a>
      <a href="/admin/products" onclick="event.preventDefault();goTo('/admin/products')" class="active">📦 Produkty</a>
      <a href="/admin/orders" onclick="event.preventDefault();goTo('/admin/orders')">🛒 Objednávky</a>
      <a href="/admin/inventory" onclick="event.preventDefault();goTo('/admin/inventory')">📦 Sklad</a>
      <a href="/admin/customers" onclick="event.preventDefault();goTo('/admin/customers')">👥 Zákazníci</a>
      <a href="/admin/coupons" onclick="event.preventDefault();goTo('/admin/coupons')">🎟️ Kupóny</a>
      <a href="/admin/tickets" onclick="event.preventDefault();goTo('/admin/tickets')">🎫 Tickety</a>
      <a href="/admin/affiliates" onclick="event.preventDefault();goTo('/admin/affiliates')">🤝 Affiliate</a>
      <a href="/admin/blog" onclick="event.preventDefault();goTo('/admin/blog')">📝 Blog</a>
      <a href="/admin/email-campaigns" onclick="event.preventDefault();goTo('/admin/email-campaigns')">📧 Email kampaně</a>
      <a href="/admin/reports" onclick="event.preventDefault();goTo('/admin/reports')">📈 Reporty</a>
      <a href="/admin/analytics" onclick="event.preventDefault();goTo('/admin/analytics')">📉 Analytika</a>
      <a href="/admin/categories" onclick="event.preventDefault();goTo('/admin/categories')">🏷️ Kategorie</a>
      <div style="margin:8px 20px;height:1px;background:rgba(200,169,106,0.1);"></div>
      <a href="/" onclick="event.preventDefault();goTo('/')">← Obchod</a>
      <a href="#" onclick="adminLogout()" style="color:#f66 !important;">🚪 Odhlásit</a>
    </div>
    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h1 style="font-size:22px;font-weight:700;">📦 Správa produktů</h1>
        <button onclick="showNewProductForm()" class="btn-primary" style="padding:10px 20px;">+ Přidat produkt</button>
      </div>

      <!-- New product form -->
      <div id="new-product-form" style="display:none;background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:24px;margin-bottom:24px;">
        <h2 style="font-size:16px;font-weight:700;margin-bottom:18px;">Nový produkt</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">
          <div><label>Název *</label><input id="new-name" type="text" placeholder="Pokeball Black Matte" style="width:100%;"></div>
          <div><label>Kategorie</label><input id="new-category" type="text" placeholder="Pokebally" style="width:100%;"></div>
          <div><label>SKU</label><input id="new-sku" type="text" placeholder="PKB-BLK-001" style="width:100%;"></div>
          <div><label>Cena Small (Kč)</label><input id="new-price_small" type="number" placeholder="299" style="width:100%;"></div>
          <div><label>Cena Standard (Kč)</label><input id="new-price_standard" type="number" placeholder="449" style="width:100%;"></div>
          <div><label>Cena Maxi (Kč)</label><input id="new-price_maxi" type="number" placeholder="649" style="width:100%;"></div>
          <div><label>Výprodejní cena (Kč)</label><input id="new-sale_price" type="number" placeholder="Ponechat prázdné" style="width:100%;"></div>
          <div><label>Sklad (ks)</label><input id="new-stock_quantity" type="number" placeholder="10" style="width:100%;"></div>
          <div style="grid-column:1/-1;"><label>Popis</label><textarea id="new-description" rows="2" placeholder="Popis produktu..." style="width:100%;"></textarea></div>

          <!-- ─── BARVY A OBRÁZKY ─── -->
          <div style="grid-column:1/-1;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <label style="margin:0;font-weight:600;">🎨 Barvy a obrázky produktu</label>
              <div style="display:flex;align-items:center;gap:10px;">
                <label style="margin:0;font-size:13px;color:#777;">Počet barev:</label>
                <input type="number" id="new-color-count" value="3" min="1" max="50"
                  style="width:70px;padding:6px 10px;border:1px solid #333;border-radius:6px;background:#0a0a0a;color:#fff;font-size:13px;text-align:center;"
                  onchange="renderColorInputs('new', this.value)"
                  oninput="renderColorInputs('new', this.value)">
              </div>
            </div>
            <div id="new-color-inputs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;"></div>
          </div>

          <div style="grid-column:1/-1;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;"><input id="new-is_active" type="checkbox" checked style="width:auto;accent-color:#c8a96a;"> Aktivní</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;"><input id="new-is_featured" type="checkbox" style="width:auto;accent-color:#c8a96a;"> Doporučený</label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;"><input id="new-is_new" type="checkbox" style="width:auto;accent-color:#c8a96a;"> Novinka</label>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:18px;">
          <button onclick="createProduct()" class="btn-primary" style="padding:11px 28px;">Vytvořit produkt</button>
          <button onclick="document.getElementById('new-product-form').style.display='none'" class="btn-secondary" style="padding:11px 16px;">Zrušit</button>
        </div>
      </div>

      <div id="admin-products-list"><div class="loading-spinner"></div></div>
    </div>
  </div>
</main>

<script>
// ── Color input renderer ────────────────────────────────────────
function renderColorInputs(prefix, count, existingColors = []) {
  var container = document.getElementById(prefix + '-color-inputs');
  if (!container) return;
  count = parseInt(count) || 3;

  var defaultColors = ['black','white','gray','red','blue','green','yellow','purple'];
  var defaultNames  = ['Černá','Bílá','Šedá','Červená','Modrá','Zelená','Žlutá','Fialová'];

  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    var existing = existingColors[i] || {};
    var colorVal  = existing.value || defaultColors[i] || '';
    var nameVal   = existing.name  || defaultNames[i]  || '';
    var frontImg  = existing.front_image || '';
    var backImg   = existing.back_image  || '';
    var hexVal    = existing.hex || '';

    container.insertAdjacentHTML('beforeend', `
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:14px;">
        <div style="font-size:12px;color:#c8a96a;font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">Barva ${i+1}</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><label style="font-size:12px;">Název barvy</label>
              <input type="text" id="${prefix}-c${i}-name" value="${escapeHtml(nameVal)}" placeholder="Černá" style="width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:13px;">
            </div>
            <div><label style="font-size:12px;">Hodnota (slug)</label>
              <input type="text" id="${prefix}-c${i}-value" value="${escapeHtml(colorVal)}" placeholder="black" style="width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:13px;" oninput="updateColorPreview('${prefix}',${i},this.value)">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center;">
            <input type="color" id="${prefix}-c${i}-hex" value="${hexVal || '#111111'}"
              style="width:40px;height:36px;border:1px solid #333;border-radius:5px;cursor:pointer;background:none;padding:2px;"
              oninput="document.getElementById('${prefix}-c${i}-hex-text').value=this.value" title="Vyberte barvu">
            <input type="text" id="${prefix}-c${i}-hex-text" value="${hexVal || '#111111'}" placeholder="#111111"
              style="width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:13px;font-family:monospace;"
              oninput="document.getElementById('${prefix}-c${i}-hex').value=this.value">
          </div>
          <div><label style="font-size:12px;">URL obrázku — přední strana</label>
            <input type="text" id="${prefix}-c${i}-front" value="${escapeHtml(frontImg)}" placeholder="/images/products/pokebowl-black-front.jpg" style="width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:12px;font-family:monospace;">
          </div>
          <div><label style="font-size:12px;">URL obrázku — zadní strana</label>
            <input type="text" id="${prefix}-c${i}-back" value="${escapeHtml(backImg)}" placeholder="/images/products/pokebowl-black-back.jpg" style="width:100%;padding:8px;border:1px solid #333;border-radius:5px;background:#0a0a0a;color:#fff;font-size:12px;font-family:monospace;">
          </div>
          <div id="${prefix}-c${i}-preview" style="display:flex;gap:8px;margin-top:2px;"></div>
        </div>
      </div>`);

    // Show image previews if URLs present
    if (frontImg || backImg) updateColorPreview(prefix, i, colorVal, frontImg, backImg);
  }
}

function updateColorPreview(prefix, index, colorValue, frontUrl, backUrl) {
  var preview = document.getElementById(`${prefix}-c${index}-preview`);
  if (!preview) return;
  var f = frontUrl || document.getElementById(`${prefix}-c${index}-front`)?.value;
  var b = backUrl  || document.getElementById(`${prefix}-c${index}-back`)?.value;
  if (!f && !b) { preview.innerHTML = ''; return; }
  preview.innerHTML = [
    f ? `<img src="${escapeHtml(f)}" alt="Přední" style="width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #333;" onerror="this.style.opacity=0.3" title="Přední">` : '',
    b ? `<img src="${escapeHtml(b)}" alt="Zadní"  style="width:52px;height:52px;object-fit:cover;border-radius:6px;border:1px solid #333;" onerror="this.style.opacity=0.3" title="Zadní">` : ''
  ].join('');
}
window.renderColorInputs = renderColorInputs;
window.updateColorPreview = updateColorPreview;

function collectColors(prefix) {
  var count = parseInt(document.getElementById(prefix + '-color-count')?.value) || 3;
  var colors = [];
  for (let i = 0; i < count; i++) {
    var name  = document.getElementById(`${prefix}-c${i}-name`)?.value?.trim();
    var value = document.getElementById(`${prefix}-c${i}-value`)?.value?.trim().toLowerCase().replace(/\s+/g,'-');
    var hex   = document.getElementById(`${prefix}-c${i}-hex`)?.value || '';
    var front = document.getElementById(`${prefix}-c${i}-front`)?.value?.trim();
    var back  = document.getElementById(`${prefix}-c${i}-back`)?.value?.trim();
    if (name || value) colors.push({ name, value, hex, front_image: front, back_image: back });
  }
  return colors;
}

// ── Init on load ──
document.addEventListener('DOMContentLoaded', () => {
  renderColorInputs('new', 3);
});

function showNewProductForm() {
  var el = document.getElementById('new-product-form');
  var isHidden = el.style.display === 'none' || !el.style.display;
  el.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    var countEl = document.getElementById('new-color-count');
    renderColorInputs('new', countEl?.value || 3);
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}
window.showNewProductForm = showNewProductForm;
</script>
