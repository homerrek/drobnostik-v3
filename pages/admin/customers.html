<script>
async function loadAdminCustomers() {
  if (!checkAdminAuth()) return;
  var el = document.getElementById('customers-list');
  if (!el) return;
  try {
    var sb = await getSupabase();
    var { data: orders } = await sb.from('orders').select('customer_name, customer_email, customer_city, total_price, created_at').order('created_at', { ascending: false });
    if (!orders?.length) { el.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">Žádní zákazníci</div>'; return; }

    // Aggregate by email
    var customers = {};
    orders.forEach(o => {
      var key = o.customer_email || o.customer_name;
      if (!customers[key]) {
        customers[key] = { name: o.customer_name, email: o.customer_email, city: o.customer_city, orders: 0, total: 0, last: o.created_at };
      }
      customers[key].orders++;
      customers[key].total += o.total_price || 0;
      if (o.created_at > customers[key].last) customers[key].last = o.created_at;
    });

    var sorted = Object.values(customers).sort((a, b) => b.total - a.total);

    el.innerHTML = `<table class="data-table">
      <thead><tr><th>Jméno</th><th>Email</th><th>Město</th><th>Objednávky</th><th>Útrata celkem</th><th>Poslední nákup</th></tr></thead>
      <tbody>${sorted.map(c => `
        <tr>
          <td style="font-weight:600;">${escapeHtml(c.name)}</td>
          <td style="color:#777;font-size:13px;">${escapeHtml(c.email || '—')}</td>
          <td style="color:#777;font-size:13px;">${escapeHtml(c.city || '—')}</td>
          <td style="text-align:center;font-weight:600;">${c.orders}</td>
          <td style="font-weight:700;color:#c8a96a;">${formatPrice(c.total)} Kč</td>
          <td style="color:#666;font-size:12px;">${formatDate(c.last)}</td>
        </tr>`).join('')}
      </tbody></table>`;
  } catch(e) {
    el.innerHTML = `<div style="color:#f44;padding:20px;">Chyba: ${e.message}</div>`;
  }
}
window.loadAdminCustomers = loadAdminCustomers;
</script>
