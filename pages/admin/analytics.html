<main>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <div style="padding:16px 20px;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:1px;">Admin panel</div>
      <a href="/admin" onclick="event.preventDefault();goTo('/admin')">📊 Dashboard</a>
      <a href="/admin/products" onclick="event.preventDefault();goTo('/admin/products')">📦 Produkty</a>
      <a href="/admin/orders" onclick="event.preventDefault();goTo('/admin/orders')">🛒 Objednávky</a>
      <a href="/admin/inventory" onclick="event.preventDefault();goTo('/admin/inventory')">📦 Sklad</a>
      <a href="/admin/customers" onclick="event.preventDefault();goTo('/admin/customers')">👥 Zákazníci</a>
      <a href="/admin/coupons" onclick="event.preventDefault();goTo('/admin/coupons')">🎟️ Kupóny</a>
      <a href="/admin/tickets" onclick="event.preventDefault();goTo('/admin/tickets')">🎫 Tickety</a>
      <a href="/admin/affiliates" onclick="event.preventDefault();goTo('/admin/affiliates')">🤝 Affiliate</a>
      <a href="/admin/blog" onclick="event.preventDefault();goTo('/admin/blog')">📝 Blog</a>
      <a href="/admin/email-campaigns" onclick="event.preventDefault();goTo('/admin/email-campaigns')">📧 Email kampaně</a>
      <a href="/admin/reports" onclick="event.preventDefault();goTo('/admin/reports')">📈 Reporty</a>
      <a href="/admin/analytics" onclick="event.preventDefault();goTo('/admin/analytics')" class="active">📉 Analytika</a>
      <a href="/admin/categories" onclick="event.preventDefault();goTo('/admin/categories')">🏷️ Kategorie</a>
      <div style="margin:8px 20px;height:1px;background:rgba(200,169,106,0.1);"></div>
      <a href="/" onclick="event.preventDefault();goTo('/')">← Obchod</a>
      <a href="#" onclick="adminLogout()" style="color:#f66 !important;">🚪 Odhlásit</a>
    </div>
    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h1 style="font-size:22px;font-weight:700;">📉 Analytika</h1>
        <div style="display:flex;gap:8px;">
          <select id="analytics-period" onchange="loadAdminAnalytics()" style="padding:8px 12px;border:1px solid #333;border-radius:6px;background:#111;color:#fff;font-size:13px;">
            <option value="7">Posledních 7 dní</option>
            <option value="30" selected>Posledních 30 dní</option>
            <option value="90">Posledních 90 dní</option>
          </select>
        </div>
      </div>

      <!-- KPI cards -->
      <div id="analytics-kpis" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;">
        <div class="loading-spinner"></div>
      </div>

      <!-- Charts row -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" class="grid-contact">
        <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:16px;">Obrat dle měsíce</h2>
          <canvas id="revenue-chart" height="200"></canvas>
        </div>
        <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;">
          <h2 style="font-size:15px;font-weight:700;margin-bottom:16px;">Objednávky dle stavu</h2>
          <canvas id="orders-chart" height="200"></canvas>
        </div>
      </div>

      <!-- Top products -->
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;margin-bottom:20px;">
        <h2 style="font-size:15px;font-weight:700;margin-bottom:16px;">Nejprodávanější produkty</h2>
        <div id="top-products-list"></div>
      </div>

      <div id="analytics-content"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
var revenueChart = null;
var ordersChart = null;

async function loadAdminAnalytics() {
  if (typeof checkAdminAuth === 'function' && !checkAdminAuth()) return;

  var kpisEl = document.getElementById('analytics-kpis');

  try {
    var sb = await getSupabase();
    var [ordersRes, productsRes, subsRes] = await Promise.all([
      sb.from('orders').select('*').order('created_at', { ascending: false }),
      sb.from('products').select('id,name,sold_count,stock_quantity,price_standard,category'),
      sb.from('newsletter_subscribers').select('id', { count: 'exact' })
    ]);

    var orders = ordersRes.data || [];
    var products = productsRes.data || [];

    var revenue = orders.reduce((s, o) => s + (o.total_amount || 0), 0);
    var avgOrder = orders.length > 0 ? Math.round(revenue / orders.length) : 0;
    var pendingOrders = orders.filter(o => o.status === 'pending').length;
    var convRate = orders.length > 0 ? ((orders.filter(o => o.status !== 'cancelled').length / orders.length) * 100).toFixed(1) : 0;

    if (kpisEl) kpisEl.innerHTML = `
      <div style="padding:18px;background:#111;border-radius:8px;border:1px solid #2a2a2a;text-align:center;">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Celkový obrat</div>
        <div style="font-size:26px;font-weight:700;color:#4f4;">${formatPrice(revenue)} Kč</div>
      </div>
      <div style="padding:18px;background:#111;border-radius:8px;border:1px solid #2a2a2a;text-align:center;">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Objednávek</div>
        <div style="font-size:26px;font-weight:700;color:#c8a96a;">${orders.length}</div>
      </div>
      <div style="padding:18px;background:#111;border-radius:8px;border:1px solid #2a2a2a;text-align:center;">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Průměrná objednávka</div>
        <div style="font-size:26px;font-weight:700;">${formatPrice(avgOrder)} Kč</div>
      </div>
      <div style="padding:18px;background:#111;border-radius:8px;border:1px solid #2a2a2a;text-align:center;">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Čekající</div>
        <div style="font-size:26px;font-weight:700;color:#fa0;">${pendingOrders}</div>
      </div>
      <div style="padding:18px;background:#111;border-radius:8px;border:1px solid #2a2a2a;text-align:center;">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;">Newsletter</div>
        <div style="font-size:26px;font-weight:700;color:#4af;">${subsRes.count || 0}</div>
      </div>`;

    // Revenue chart by month
    var monthlyData = {};
    orders.forEach(o => {
      var month = new Date(o.created_at).toLocaleDateString('cs-CZ', { month: 'short', year: '2-digit' });
      monthlyData[month] = (monthlyData[month] || 0) + (o.total_amount || 0);
    });
    var months = Object.keys(monthlyData).slice(-6);
    var revenues = months.map(m => monthlyData[m]);

    var revenueCtx = document.getElementById('revenue-chart');
    if (revenueCtx) {
      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(revenueCtx, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{ label: 'Obrat (Kč)', data: revenues, backgroundColor: 'rgba(200,169,106,0.7)', borderColor: '#c8a96a', borderWidth: 1, borderRadius: 4 }]
        },
        options: { responsive: true, plugins: { legend: { labels: { color: '#999' } } }, scales: { x: { ticks: { color: '#777' }, grid: { color: '#1e1e1e' } }, y: { ticks: { color: '#777', callback: v => formatPrice(v) + ' Kč' }, grid: { color: '#1e1e1e' } } } }
      });
    }

    // Orders by status donut
    var statusCounts = {};
    orders.forEach(o => { statusCounts[o.status] = (statusCounts[o.status] || 0) + 1; });
    var ordersCtx = document.getElementById('orders-chart');
    if (ordersCtx) {
      if (ordersChart) ordersChart.destroy();
      ordersChart = new Chart(ordersCtx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{ data: Object.values(statusCounts), backgroundColor: ['#fa0','#4af','#c8a96a','#4f4','#f44','#777'], borderWidth: 0 }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#999', padding: 12 } } } }
      });
    }

    // Top products
    var topProds = [...products].sort((a, b) => (b.sold_count || 0) - (a.sold_count || 0)).slice(0, 5);
    var topEl = document.getElementById('top-products-list');
    if (topEl) {
      var maxSold = topProds[0]?.sold_count || 1;
      topEl.innerHTML = topProds.map(p => `
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <div style="min-width:140px;font-size:13px;font-weight:600;color:#ccc;">${escapeHtml(p.name)}</div>
          <div style="flex:1;background:#2a2a2a;border-radius:4px;height:8px;overflow:hidden;">
            <div style="width:${Math.round((p.sold_count||0)/maxSold*100)}%;background:#c8a96a;height:100%;border-radius:4px;transition:width 0.6s;"></div>
          </div>
          <div style="min-width:60px;text-align:right;font-size:13px;color:#c8a96a;font-weight:700;">${p.sold_count || 0} ks</div>
        </div>`).join('');
    }

  } catch (e) {
    if (kpisEl) kpisEl.innerHTML = `<div style="color:#f44;padding:20px;grid-column:1/-1;">Chyba: ${escapeHtml(e.message)}</div>`;
  }
}

window.loadAdminAnalytics = loadAdminAnalytics;
</script>
