<main>
  <div class="admin-layout">
    <div class="admin-sidebar">
      <div style="padding:16px 20px;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:1px;">Admin panel</div>
      <a href="/admin" onclick="event.preventDefault();goTo('/admin')">📊 Dashboard</a>
      <a href="/admin/products" onclick="event.preventDefault();goTo('/admin/products')">📦 Produkty</a>
      <a href="/admin/orders" onclick="event.preventDefault();goTo('/admin/orders')">🛒 Objednávky</a>
      <a href="/admin/inventory" onclick="event.preventDefault();goTo('/admin/inventory')">📦 Sklad</a>
      <a href="/admin/customers" onclick="event.preventDefault();goTo('/admin/customers')">👥 Zákazníci</a>
      <a href="/admin/coupons" onclick="event.preventDefault();goTo('/admin/coupons')">🎟️ Kupóny</a>
      <a href="/admin/tickets" onclick="event.preventDefault();goTo('/admin/tickets')">🎫 Tickety</a>
      <a href="/admin/affiliates" onclick="event.preventDefault();goTo('/admin/affiliates')">🤝 Affiliate</a>
      <a href="/admin/blog" onclick="event.preventDefault();goTo('/admin/blog')">📝 Blog</a>
      <a href="/admin/email-campaigns" onclick="event.preventDefault();goTo('/admin/email-campaigns')">📧 Email kampaně</a>
      <a href="/admin/reports" onclick="event.preventDefault();goTo('/admin/reports')" class="active">📈 Reporty</a>
      <a href="/admin/analytics" onclick="event.preventDefault();goTo('/admin/analytics')">📉 Analytika</a>
      <a href="/admin/categories" onclick="event.preventDefault();goTo('/admin/categories')">🏷️ Kategorie</a>
      <div style="margin:8px 20px;height:1px;background:rgba(200,169,106,0.1);"></div>
      <a href="/" onclick="event.preventDefault();goTo('/')">← Obchod</a>
      <a href="#" onclick="adminLogout()" style="color:#f66 !important;">🚪 Odhlásit</a>
    </div>
    <div class="admin-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
        <h1 style="font-size:22px;font-weight:700;">📈 Reporty & statistiky</h1>
        <button onclick="exportAllCSV()" class="btn-primary" style="padding:9px 18px;font-size:13px;">📥 Export CSV</button>
      </div>
      <div id="reports-content"><div class="loading-spinner"></div></div>
    </div>
  </div>
</main>

<script>
async function loadAdminReports() {
  if (typeof checkAdminAuth === 'function' && !checkAdminAuth()) return;
  var el = document.getElementById('reports-content');
  if (!el) return;
  try {
    var sb = await getSupabase();
    var [ordersRes, productsRes] = await Promise.all([
      sb.from('orders').select('*').order('created_at', { ascending: false }),
      sb.from('products').select('*')
    ]);
    var orders = ordersRes.data || [];
    var products = productsRes.data || [];

    var revenue = orders.reduce((s, o) => s + (o.total_amount || 0), 0);
    var avgOrder = orders.length > 0 ? Math.round(revenue / orders.length) : 0;
    var byStatus = {};
    orders.forEach(o => { byStatus[o.status] = (byStatus[o.status] || 0) + 1; });
    var byShipping = {};
    orders.forEach(o => { byShipping[o.shipping_method || 'standard'] = (byShipping[o.shipping_method || 'standard'] || 0) + 1; });

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;">
        <div style="padding:20px;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;">
          <div style="font-size:11px;color:#555;text-transform:uppercase;margin-bottom:6px;">Celkový obrat</div>
          <div style="font-size:28px;font-weight:700;color:#4f4;">${formatPrice(revenue)} Kč</div>
        </div>
        <div style="padding:20px;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;">
          <div style="font-size:11px;color:#555;text-transform:uppercase;margin-bottom:6px;">Objednávek celkem</div>
          <div style="font-size:28px;font-weight:700;">${orders.length}</div>
        </div>
        <div style="padding:20px;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;">
          <div style="font-size:11px;color:#555;text-transform:uppercase;margin-bottom:6px;">Průměrná objednávka</div>
          <div style="font-size:28px;font-weight:700;color:#c8a96a;">${formatPrice(avgOrder)} Kč</div>
        </div>
        <div style="padding:20px;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;">
          <div style="font-size:11px;color:#555;text-transform:uppercase;margin-bottom:6px;">Produktů</div>
          <div style="font-size:28px;font-weight:700;">${products.length}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" class="grid-contact">
        <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">Objednávky dle stavu</h3>
          ${Object.entries(byStatus).map(([s, c]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e;">
              <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:8px;height:8px;border-radius:50%;background:${s==='delivered'?'#4f4':s==='pending'?'#fa0':s==='shipped'?'#4af':s==='processing'?'#c8a96a':'#777'};"></div>
                <span style="font-size:13px;color:#ccc;">${escapeHtml(s)}</span>
              </div>
              <span style="font-weight:700;font-size:15px;">${c}</span>
            </div>`).join('')}
        </div>
        <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;">
          <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">Způsob doručení</h3>
          ${Object.entries(byShipping).map(([s, c]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e1e1e;">
              <span style="font-size:13px;color:#ccc;">${escapeHtml(({
  zasilkovna:'📦 Zásilkovna výdejní', zasilkovna_home:'📦 Zásilkovna domů',
  ppl:'🚚 PPL', dpd:'🚚 DPD', gls:'🚚 GLS',
  ceska_posta:'📮 ČP Do ruky', ceska_posta_box:'📮 ČP Na poštu',
  dhl_express:'⚡ DHL Express', pickup:'🏠 Osobní odběr',
  standard:'🚚 Standardní', express:'⚡ Expres'
}[s] || s))}</span>
              <span style="font-weight:700;">${c}x</span>
            </div>`).join('')}
        </div>
      </div>

      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:14px;">Posledních 10 objednávek</h3>
        <table class="data-table">
          <thead><tr><th>Objednávka</th><th>Zákazník</th><th>Stav</th><th>Částka</th><th>Datum</th></tr></thead>
          <tbody>${orders.slice(0, 10).map(o => `
            <tr>
              <td style="font-family:monospace;color:#c8a96a;font-size:12px;">${escapeHtml(o.order_number)}</td>
              <td style="font-size:13px;">${escapeHtml(o.customer_name)}</td>
              <td><span class="badge">${o.status}</span></td>
              <td style="font-weight:700;">${formatPrice(o.total_amount)} Kč</td>
              <td style="color:#666;font-size:12px;">${formatDate(o.created_at)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch (e) {
    el.innerHTML = `<div style="color:#f44;padding:20px;">Chyba: ${escapeHtml(e.message)}</div>`;
  }
}

async function exportAllCSV() {
  try {
    var sb = await getSupabase();
    var { data: orders } = await sb.from('orders').select('*, order_items(*)').order('created_at', { ascending: false });
    if (!orders?.length) { showToast('Žádná data k exportu'); return; }

    var rows = [['Číslo objednávky','Zákazník','Email','Město','Doručení','Celkem','Status','Datum']];
    orders.forEach(o => {
      rows.push([o.order_number, o.customer_name, o.customer_email || '', o.customer_city || '', o.shipping_method || '', o.total_amount, o.status, new Date(o.created_at).toLocaleDateString('cs-CZ')]);
    });

    var csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = `drobnostik-objednavky-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showToast('✓ Export stažen');
  } catch (e) { showToast('Chyba exportu: ' + e.message); }
}

window.loadAdminReports = loadAdminReports;
window.exportAllCSV = exportAllCSV;
</script>
