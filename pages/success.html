<main style="padding:40px 20px;">
  <div style="max-width:600px;margin:0 auto;text-align:center;">
    <div style="padding:60px 40px;background:#1a1a1a;border-radius:12px;border:1px solid rgba(200,169,106,0.15);">
      <div style="font-size:64px;margin-bottom:20px;">🎉</div>
      <h1 style="font-size:28px;font-weight:700;color:#c8a96a;margin-bottom:12px;">Objednávka přijata!</h1>
      <p style="color:#999;font-size:15px;margin-bottom:28px;line-height:1.7;">
        Děkujeme za váš nákup! Potvrzení objednávky vám bylo zasláno emailem.<br>Doručení: 3-5 pracovních dní.
      </p>
      <div id="success-content" style="margin-bottom:28px;"></div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button onclick="goTo('/track-order')" class="btn-secondary" style="padding:12px 20px;">📦 Sledovat objednávku</button>
        <button onclick="printInvoice(Storage.get('last-order'))" class="btn-secondary" style="padding:12px 20px;">🖨️ Tisknout fakturu</button>
        <button onclick="goTo('/shop')" class="btn-primary" style="padding:12px 24px;">Zpět do obchodu</button>
      </div>
    </div>
  </div>
</main>

<script>
function loadSuccess() {
  var orderNum = Storage.get('last-order');
  var el = document.getElementById('success-content');
  if (el && orderNum) {
    el.innerHTML = `
      <div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:20px;">
        <div style="font-size:12px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Číslo objednávky</div>
        <div style="font-family:monospace;font-size:20px;font-weight:700;color:#c8a96a;">${escapeHtml(orderNum)}</div>
      </div>`;
    document.getElementById('track-order-number-prefill')?.setAttribute?.('value', orderNum);
  }
}
window.loadSuccess = loadSuccess;
</script>
